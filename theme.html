<style>
    /* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
    :root {
        /* App shell */
        --bg: #e8edf5;
        --card: #ffffff;
        --border: #e2e8f0;
        --border-2: #f1f5f9;
        --surface: #f8fafc;
        --surface-2: #f1f5f9;

        /* Sidebar – always dark (hardcoded, not overridden by dark mode) */
        --sb-bg: #0b1220;
        --sb-card: #111d30;
        --sb-border: #1c2d44;
        --sb-text: #e2e8f0;
        --sb-muted: #64748b;
        --sb-faint: #334155;
        --sb-surface: #162236;

        /* Nav */
        --nav-bg: #0d1626;
        --nav-border: #1a2640;

        /* Semantic palette */
        --green: #10b981;
        /* profit / growth / success */
        --green-bg: #f0fdf4;
        --green-bd: #bbf7d0;
        --green-dark: #065f46;
        --green-glow: rgba(16, 185, 129, 0.22);

        --red: #ef4444;
        /* expenses / loss / warning */
        --red-bg: #fef2f2;
        --red-bd: #fecaca;
        --red-dark: #991b1b;

        --blue: #3b82f6;
        /* KPI primary / links */
        --blue-bg: #eff6ff;
        --blue-bd: #bfdbfe;
        --blue-dark: #1d4ed8;

        --purple: #8b5cf6;
        /* KPI secondary / revenue */
        --purple-bg: #f5f3ff;
        --purple-bd: #ddd6fe;

        --amber: #f59e0b;
        --amber-bg: #fffbeb;
        --amber-bd: #fde68a;

        --gray: #64748b;
        /* neutral / inactive */
        --gray-bg: #f8fafc;

        /* Typography */
        --text: #0f172a;
        --text-2: #334155;
        --text-muted: #64748b;
        --text-faint: #94a3b8;

        /* Sizing */
        --radius-sm: 6px;
        --radius: 10px;
        --radius-lg: 14px;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.1);
    }

    /* Dark mode overrides (sidebar excluded – uses its own hardcoded vars) */
    body.dark {
        --bg: #080e1a;
        --card: #111827;
        --border: #1e2d47;
        --border-2: #162236;
        --surface: #162336;
        --surface-2: #0f1a2e;
        --text: #f1f5f9;
        --text-2: #cbd5e1;
        --text-muted: #64748b;
        --text-faint: #334155;
        --green-bg: #042f1e;
        --green-bd: #065f46;
        --red-bg: #1f0909;
        --red-bd: #7f1d1d;
        --blue-bg: #0c1a3a;
        --blue-bd: #1e3a8a;
        --purple-bg: #1a0f3a;
        --purple-bd: #4c1d95;
    }

    /* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html,
    body {
        height: 100%;
        overflow: hidden;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 12px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        transition: background 0.25s, color 0.2s;
    }

    button {
        font-family: inherit;
        cursor: pointer;
        border: none;
    }

    input,
    select {
        font-family: inherit;
    }

    .btn-add {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        background: var(--blue);
        /* Fixed: Uses your existing blue theme */
        color: white;
        border: none;
        border-radius: var(--radius-sm);
        /* Fixed: Uses your existing radius */
        font-size: 11px;
        font-weight: 700;
        transition: all 0.18s;
        cursor: pointer;
        box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
        /* Adds a nice subtle blue glow */
    }

    .btn-add:hover {
        filter: brightness(1.15);
        transform: translateY(-1px);
        box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
    }

    /* ═══════════════════════════════════════════════
   APP SHELL – RESPONSIVE GRID
═══════════════════════════════════════════════ */
    .app-container {
        display: grid;
        grid-template-areas: "nav nav" "left main";
        grid-template-columns: 300px 1fr;
        grid-template-rows: 60px 1fr;
        height: 100vh;
        /* gap: 7px; padding: 7px; */
    }

    @media (max-width: 900px) {
        .app-container {
            grid-template-columns: 200px 1fr;
            gap: 5px;
            padding: 5px;
        }
    }

    @media (max-width: 680px) {
        .app-container {
            grid-template-areas: "nav" "main";
            grid-template-columns: 1fr;
            grid-template-rows: 48px 1fr;
        }

        .left-section {
            display: none;
        }
    }

    .nav-section {
        grid-area: nav;
    }

    .left-section {
        grid-area: left;
    }

    .main-section {
        grid-area: main;
        overflow: hidden;
    }

    /* ═══════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════ */
    .pos-card {
        background: var(--card);
        /* border-radius: var(--radius-lg); */
        /* box-shadow: var(--shadow); */
        /* border: 1px solid var(--border); */
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: background 0.2s;
        /* border-color 0.2s; */
    }

    /* ═══════════════════════════════════════════════
   TAB SYSTEM
═══════════════════════════════════════════════ */
    .tab-panel {
        display: none;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        /* CRITICAL: allows flex children to shrink below content size */
        overflow: hidden;
    }

    .tab-panel.active {
        display: flex;
    }

    /* ═══════════════════════════════════════════════
   SCROLLBARS
═══════════════════════════════════════════════ */
    ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
    }

    ::-webkit-scrollbar-track {
        background: transparent;
    }

    ::-webkit-scrollbar-thumb {
        background: #c8d3e0;
        border-radius: 99px;
    }

    body.dark ::-webkit-scrollbar-thumb {
        background: #1e2d47;
    }

    /* ═══════════════════════════════════════════════
   SETTINGS MODAL
═══════════════════════════════════════════════ */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
        z-index: 9999;
        display: none;
        place-items: center;
    }

    .modal-overlay.open {
        display: grid;
    }

    .modal-box {
        background: var(--card);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        width: 440px;
        max-width: 96vw;
        overflow: hidden;
        animation: modalIn 0.22s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes modalIn {
        from {
            transform: scale(0.9) translateY(16px);
            opacity: 0;
        }

        to {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
    }

    .modal-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
    }

    .modal-hd h3 {
        font-size: 13px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 7px;
    }

    .modal-close-btn {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 12px;
        display: grid;
        place-items: center;
        transition: 0.15s;
    }

    .modal-close-btn:hover {
        background: var(--border);
        color: var(--text);
    }

    .modal-body {
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .modal-section-label {
        font-size: 8.5px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: var(--text-faint);
        margin-top: 4px;
    }

    .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 9px 12px;
        background: var(--surface);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        gap: 12px;
    }

    .setting-info .s-label {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-2);
    }

    .setting-info .s-sub {
        font-size: 9.5px;
        color: var(--text-muted);
        margin-top: 1px;
    }

    /* Toggle */
    .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
    }

    .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .toggle-track {
        position: absolute;
        inset: 0;
        background: #cbd5e1;
        border-radius: 99px;
        cursor: pointer;
        transition: 0.2s;
    }

    .toggle-track::before {
        content: '';
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.22s;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
    }

    .toggle input:checked+.toggle-track {
        background: var(--green);
    }

    .toggle input:checked+.toggle-track::before {
        transform: translateX(16px);
    }

    .modal-ft {
        padding: 12px 18px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
    }

    .btn-cancel-modal {
        padding: 7px 14px;
        border-radius: var(--radius-sm);
        font-size: 11px;
        font-weight: 600;
        background: var(--surface-2);
        color: var(--text-muted);
        border: 1px solid var(--border);
        transition: 0.15s;
    }

    .btn-cancel-modal:hover {
        background: var(--border);
    }

    .btn-save-modal {
        padding: 7px 16px;
        border-radius: var(--radius-sm);
        font-size: 11px;
        font-weight: 700;
        background: var(--green);
        color: white;
        border: none;
        transition: 0.15s;
    }

    .btn-save-modal:hover {
        filter: brightness(1.08);
    }

    /* Settings select/input */
    .s-select,
    .s-input {
        padding: 5px 8px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-size: 11px;
        font-family: 'Outfit', sans-serif;
        outline: none;
        min-width: 90px;
    }

    .s-select:focus,
    .s-input:focus {
        border-color: var(--blue);
    }

    /* 1. Standard text clip (ellipsis) for Description and Category */
    .exp-row td:nth-child(1),
    .exp-row td:nth-child(3) {
        max-width: 150px;
        /* Adjust if needed to fit your screen */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* 2. Custom Floating Tooltip Styles */
    #custom-hover-tooltip {
        position: fixed;
        background: var(--nav-bg, #0d1626);
        /* Uses your dark nav color */
        color: #fff;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 11px;
        pointer-events: none;
        /* Ensures the mouse doesn't interact with the tooltip itself */
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.15s ease;
        z-index: 9999;
        max-width: 250px;
        white-space: normal;
        /* Allows text to wrap inside the tooltip */
        box-shadow: var(--shadow-lg, 0 8px 30px rgba(0, 0, 0, 0.1));
    }

    #custom-hover-tooltip.visible {
        opacity: 1;
        visibility: visible;
    }

    /* Installment Form Section Labels */
    .form-sec-lbl {
        font-size: 9px;
        font-weight: 800;
        color: var(--blue, #3b82f6);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin: 12px 0 6px 0;
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
    }

    .form-sec-lbl:first-child {
        margin-top: 0;
    }

    /* Installment Table specific handling for 14 columns */
    .horizontal-scroll-table {
        min-width: 1400px;
        /* Forces the table to be wide enough to breathe */
        white-space: nowrap;
    }

    /* Optional links styling from the image */
    .form-link-btn {
        font-size: 9px;
        font-weight: 700;
        color: var(--blue);
        cursor: pointer;
        margin-top: -4px;
        margin-bottom: 4px;
        display: inline-block;
    }

    .form-link-btn:hover {
        text-decoration: underline;
    }

    /* --- SIDEBAR BREAKDOWN TOOLTIP --- */
    #sidebar-breakdown-tooltip {
        position: fixed;
        background: var(--bg-surface, #1e293b);
        color: var(--text-main, #f8fafc);
        border: 1px solid var(--border-light, rgba(255, 255, 255, 0.1));
        border-radius: 8px;
        padding: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        font-family: 'Outfit', sans-serif;
        font-size: 11px;
        z-index: 9999;
        pointer-events: none;
        /* Prevents the tooltip from blocking the mouse */
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, transform 0.2s ease;
        transform: translateY(5px);
        min-width: 200px;
        max-width: 250px;
    }

    #sidebar-breakdown-tooltip.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .sb-tt-title {
        font-weight: 700;
        color: var(--accent-blue, #38bdf8);
        border-bottom: 1px solid var(--border-light, rgba(255, 255, 255, 0.1));
        padding-bottom: 6px;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .sb-tt-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
        gap: 10px;
    }

    .sb-tt-desc {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-muted, #94a3b8);
    }

    .sb-tt-amt {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 600;
        color: var(--text-main, #f8fafc);
    }

    .sb-tt-empty {
        text-align: center;
        font-style: italic;
        color: var(--text-faint, #64748b);
        padding: 4px 0;
    }

    /* --- MODAL OVERLAY STYLES --- */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(2px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
    }

    .modal-card {
        background: var(--bg-card, #0f172a);
        border: 1px solid var(--border-light, rgba(255, 255, 255, 0.1));
        border-radius: var(--radius-lg, 8px);
        padding: 20px;
        width: 400px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .deduct-table td {
        padding: 4px 0;
        vertical-align: middle;
    }

    /* ── Modern Sleek Dark Mode (Ultra-Compact) ── */

    .sb-wrap {
        /* Color Palette */
        --bg-base: #020617;
        --bg-card: #0f172a;
        --bg-surface: #1e293b;
        --bg-surface-hover: #334155;

        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --text-faint: #64748b;

        --accent-blue: #38bdf8;
        --accent-blue-bg: rgba(56, 189, 248, 0.1);

        --success-green: #10b981;
        --success-bg: rgba(16, 185, 129, 0.1);
        --success-border: rgba(16, 185, 129, 0.2);

        --danger-red: #f43f5e;
        --danger-bg: rgba(244, 63, 94, 0.1);
        --danger-border: rgba(244, 63, 94, 0.2);

        --border-light: rgba(255, 255, 255, 0.06);
        --radius-md: 6px;
        --radius-lg: 8px;

        background-color: var(--bg-card);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        overflow: hidden;
    }

    .form-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 9px;
    }

    .form-actions {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex-shrink: 0;
        background: var(--surface);
    }

    /* 1. Tighter Scrollable container */
    .sb-body {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px;
        /* Reduced from 16px */
        display: flex;
        flex-direction: column;
        gap: 1px;
        /* Reduced from 4px to strictly group items */
    }

    /* Top Opening Cash */
    .sb-opening {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-surface);
        padding: 2px 6px;
        /* Reduced vertical padding */
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-light);
        margin-bottom: 4px;
    }

    .sb-opening .lbl {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
    }

    .sb-opening input {
        font-size: 11px !important;
        color: var(--text-main) !important;
    }

    /* 2. Compact Section Headers */
    .sb-section {
        font-size: 10px;
        /* Scaled down slightly */
        font-weight: 700;
        color: var(--accent-blue);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin: 4px 0 2px 4px;
        /* Tighter margins */
    }

    /* Table Headers */
    .sb-thead {
        display: grid;
        grid-template-columns: 1fr 45px 85px;
        gap: 8px;
        padding: 0 4px 4px 4px;
        border-bottom: 1px solid var(--border-light);
        margin-bottom: 2px;
    }

    .sb-thead span {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-faint);
    }

    /* General Rows */
    .sb-row,
    .sb-irow {
        display: grid;
        grid-template-columns: 1fr 45px 85px;
        gap: 8px;
        align-items: center;
        padding: 2px 4px;
        /* Reduced from 4px */
        border-radius: 4px;
        transition: background 0.15s;
    }

    .sb-row:hover,
    .sb-irow:hover {
        background: var(--bg-surface);
    }

    .sb-row.two-col {
        display: flex;
        justify-content: space-between;
    }

    /* Typography */
    .lbl {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .lbl.muted {
        color: var(--text-muted);
        font-weight: 400;
    }

    .val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-align: right;
    }

    /* 3. Ultra-slim Modern Inputs */
    .sb-input {
        height: 20px !important;
        /* Shaved 8px off the height */
        padding: 0 6px !important;
        font-size: 11px !important;
        font-family: 'JetBrains Mono', monospace !important;
        font-weight: 600 !important;
        color: var(--text-main) !important;
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid transparent !important;
        border-radius: 4px !important;
        outline: none !important;
        width: 100%;
        transition: all 0.2s;
    }

    .sb-input::placeholder {
        color: var(--text-faint);
    }

    .sb-input:hover {
        background: rgba(255, 255, 255, 0.06) !important;
    }

    .sb-input:focus {
        background: var(--bg-surface) !important;
        border-color: var(--accent-blue) !important;
        box-shadow: 0 0 0 2px var(--accent-blue-bg);
    }

    .sb-input-right {
        text-align: right !important;
    }

    .sb-input-center {
        text-align: center !important;
        padding: 0 2px !important;
    }

    /* 4. Compact Summary Rows */
    .sb-subtotal {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 8px;
        /* Reduced from 10px */
        margin: 2px 0;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        border-top: 1px dashed var(--border-light);
    }

    .sb-subtotal span:last-child {
        font-family: 'JetBrains Mono', monospace;
        color: var(--text-main);
        font-size: 11px;
    }

    /* Details Dropdown styling */
    details summary {
        cursor: pointer;
        list-style: none;
        outline: none;
    }

    details summary::-webkit-details-marker {
        display: none;
    }

    .details-content {
        padding-left: 12px;
        border-left: 2px solid var(--border-light);
    }

    /* 5. Tighter Pinned Footer */
    .sb-footer {
        flex-shrink: 0;
        padding: 10px 14px;
        background: var(--bg-base);
        border-top: 2px solid var(--border-light);
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
        z-index: 10;
    }

    .footer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        /* CRITICAL: Allows wrapping if number is too large */
        gap: 4px 15px;
        /* Creates a physical barrier between label and input/value */
        width: 100%;
        margin-bottom: 6px;
    }

    .footer-row .lbl {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-main);

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script>
    /* ==========================================================================
      GROUP 1: UTILITIES
      ========================================================================== */
    const fmt = v => v.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const esc = s => !s ? '' : String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const el = id => document.getElementById(id);
    const setV = (id, v) => { const e = el(id); if (e) e.value = v; };
    const getV = id => { const e = el(id); return e ? e.value : ''; };
    const setT = (id, v) => { const e = el(id); if (e) e.textContent = v; };
    const bindBtn = (id, fn) => { const b = el(id); if (b) b.onclick = e => { e.preventDefault(); fn(); }; };

    function formatHugeNumber(num) {
        const absoluteNum = Math.abs(num);
        if (absoluteNum >= 1.0e+9) return (num / 1.0e+9).toFixed(2) + "B";
        if (absoluteNum >= 1.0e+6) return (num / 1.0e+6).toFixed(2) + "M";
        return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }


    /* ==========================================================================
      GROUP 2: MASTER APP INITIALIZATION
      ========================================================================== */
    document.addEventListener('DOMContentLoaded', () => {

        // A. Initial Renders & Binds
        if (typeof fullRender === 'function') fullRender();
        if (typeof renderChecks === 'function') renderChecks();
        if (typeof renderIncome === 'function') renderIncome();
        if (typeof resetForm === 'function') resetForm();
        if (typeof resetCheckForm === 'function') resetCheckForm();
        if (typeof resetIncomeForm === 'function') resetIncomeForm();

        bindBtn('saveBtn', typeof saveExpense !== 'undefined' ? saveExpense : () => { });
        bindBtn('deleteBtn', typeof deleteCurrentItem !== 'undefined' ? deleteCurrentItem : () => { });
        bindBtn('checkSaveBtn', typeof saveCheck !== 'undefined' ? saveCheck : () => { });
        bindBtn('checkDeleteBtn', typeof deleteCheckItem !== 'undefined' ? deleteCheckItem : () => { });
        bindBtn('incomeSaveBtn', typeof saveIncome !== 'undefined' ? saveIncome : () => { });
        bindBtn('incomeDeleteBtn', typeof deleteIncomeItem !== 'undefined' ? deleteIncomeItem : () => { });

        // B. Basic UI Setup
        document.body.classList.add('compact');
        document.querySelectorAll('.nb-tab').forEach(tab => {
            tab.addEventListener('mouseenter', function () { this.click(); });
        });

        // C. Watch Expenses Table to Auto-Sync to Sidebar
        const totalToWatch = el('grandTotalDisplay');
        if (totalToWatch) {
            // C. Watch Tables to Auto-Sync to Sidebar
            const observer = new MutationObserver(() => syncSidebarTotals());

            // Watch all three grand total displays for changes
            if (el('grandTotalDisplay')) observer.observe(el('grandTotalDisplay'), { childList: true, characterData: true, subtree: true });
            if (el('tot-checks')) observer.observe(el('tot-checks'), { childList: true, characterData: true, subtree: true });
            if (el('tot-income')) observer.observe(el('tot-income'), { childList: true, characterData: true, subtree: true });

            syncSidebarTotals(); // Initial sync
        }

        // D. Watch Sidebar to Auto-Hide Empty Rows
        const sbBody = document.querySelector('.sb-body');
        if (sbBody) {
            updateSidebarVisibility(); // Run once to hide empty rows on load
            const sbObserver = new MutationObserver(() => updateSidebarVisibility());
            sbObserver.observe(sbBody, { childList: true, characterData: true, subtree: true });
        }

        // E. Inject Global Tooltips
        initTooltips();
    });


    /* ==========================================================================
      GROUP 3: GLOBAL EVENT DELEGATION
      ========================================================================== */
    document.body.addEventListener('input', function (e) {

        // 1. Auto-Comma Formatting for Inputs
        if (e.target.classList.contains('comma-input')) {
            let rawValue = e.target.value.replace(/[^0-9.]/g, '');
            const parts = rawValue.split('.');
            if (parts.length > 2) rawValue = parts[0] + '.' + parts.slice(1).join('');

            if (rawValue !== '') {
                const wholePart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                const decimalPart = parts.length > 1 ? '.' + parts[1] : '';
                e.target.value = wholePart + decimalPart;
            } else {
                e.target.value = '';
            }
        }

        // 2. Trigger Modals dynamically based on where user types
        if (e.target.classList.contains('deduct-input') && typeof calculateDeductions === 'function') {
            calculateDeductions();
        }
        if (e.target.classList.contains('denom-qty') && typeof calculateDenomination === 'function') {
            calculateDenomination();
        }
    });


    /* ==========================================================================
      GROUP 4: UI CONTROLLERS & CUSTOM DIALOGS
      ========================================================================== */
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nb-tab').forEach(b => b.classList.remove('active'));
        const p = el('tab-' + tabId); if (p) p.classList.add('active');
        if (btn) btn.classList.add('active');
    }

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark');
        const b = el('themeToggleBtn'); if (b) b.textContent = isDark ? '☀️' : '🌙';
        const s = el('settingDark'); if (s) s.checked = isDark;
    }

    function openSettings() { el('settingsModal').style.display = 'flex'; }
    function closeSettings() { el('settingsModal').style.display = 'none'; }
    function applySettings() {
        document.body.classList.toggle('dark', !!el('settingDark')?.checked);
        const b = el('themeToggleBtn'); if (b) b.textContent = el('settingDark')?.checked ? '☀️' : '🌙';
        document.body.classList.toggle('compact', !!el('settingCompact')?.checked);
    }
    function saveSettings() { applySettings(); closeSettings(); }

    // Custom Alert / Confirm Logic
    function closeCustomDialog() {
        el('customDialogModal').style.display = 'none';
    }

    function showAppAlert(title, message) {
        el('customDialogTitle').innerText = title || 'Alert';
        el('customDialogMessage').innerText = message;
        el('customDialogCancelBtn').style.display = 'none';

        const confirmBtn = el('customDialogConfirmBtn');
        confirmBtn.innerText = 'OK';
        confirmBtn.className = 'btn-save update';
        confirmBtn.onclick = closeCustomDialog;

        el('customDialogModal').style.display = 'flex';
    }

    function showAppConfirm(title, message, onConfirm) {
        el('customDialogTitle').innerText = title || 'Confirm Action';
        el('customDialogMessage').innerText = message;
        el('customDialogCancelBtn').style.display = 'block';

        const confirmBtn = el('customDialogConfirmBtn');
        confirmBtn.innerText = 'Yes, Delete';
        confirmBtn.className = 'btn-delete';
        confirmBtn.style.display = 'flex';

        confirmBtn.onclick = function () {
            closeCustomDialog();
            if (typeof onConfirm === 'function') onConfirm();
        };

        el('customDialogModal').style.display = 'flex';
    }


    /* ==========================================================================
      GROUP 5: SIDEBAR LOGIC & MATH
      ========================================================================== */
    function syncSidebarTotals() {
        // 1. SYNC EXPENSES
        const valComp = parseFloat(el('tot-company')?.textContent.replace(/[^0-9.-]+/g, "")) || 0;
        const valPurc = parseFloat(el('tot-purchases')?.textContent.replace(/[^0-9.-]+/g, "")) || 0;
        const valDraw = parseFloat(el('tot-drawings')?.textContent.replace(/[^0-9.-]+/g, "")) || 0;

        if (el('sidebar-cash-expenses')) el('sidebar-cash-expenses').textContent = valComp > 0 ? fmt(valComp) : '-';
        if (el('sidebar-cash-purchases')) el('sidebar-cash-purchases').textContent = valPurc > 0 ? fmt(valPurc) : '-';
        if (el('sidebar-drawings')) el('sidebar-drawings').textContent = valDraw > 0 ? fmt(valDraw) : '-';

        // 2. SYNC CHECK PAYMENTS & E-WALLETS
        if (typeof checksData !== 'undefined') {
            let chk = 0, tf = 0, gc = 0, ew = 0;
            checksData.forEach(i => {
                if (i.type === 'Bank Check') chk += i.amount;
                else if (i.type === 'Bank Transfer') tf += i.amount;
                else if (i.type === 'GCash') gc += i.amount;
                else if (i.type === 'Other E-Wallet') ew += i.amount;
            });

            if (el('sb-in-pay-check')) el('sb-in-pay-check').textContent = chk > 0 ? fmt(chk) : '-';
            if (el('sb-in-pay-transfer')) el('sb-in-pay-transfer').textContent = tf > 0 ? fmt(tf) : '-';
            if (el('sb-in-pay-gcash')) el('sb-in-pay-gcash').textContent = gc > 0 ? fmt(gc) : '-';
            if (el('sb-in-pay-ewallet')) el('sb-in-pay-ewallet').textContent = ew > 0 ? fmt(ew) : '-';
        }

        // 3. SYNC OTHER INCOME
        if (typeof incomeData !== 'undefined') {
            const totalInc = incomeData.reduce((sum, i) => sum + i.amount, 0);
            if (el('sidebar-others')) el('sidebar-others').textContent = totalInc > 0 ? fmt(totalInc) : '-';
        }

        // 4. RECALCULATE EXPECTED CASH & VARIANCE
        if (typeof calculateMasterTotals === 'function') calculateMasterTotals();
    }

    function updateSidebarVisibility() {
        const targetIds = [
            'sidebar-collections', 'sidebar-credits', 'sidebar-others',
            'sidebar-cash-expenses', 'sidebar-drawings', 'sidebar-cash-purchases',
            'sb-in-pay-check', 'sb-in-pay-transfer', 'sb-in-pay-gcash', 'sb-in-pay-ewallet'
        ];

        targetIds.forEach(id => {
            const valSpan = el(id);
            if (valSpan) {
                const row = valSpan.closest('.sb-row');
                if (row) {
                    const val = valSpan.textContent.trim();
                    if (val === '-' || val === '0.00' || val === '0' || val === '') {
                        row.style.display = 'none';
                    } else {
                        row.style.display = 'flex';
                    }
                }
            }
        });
    }

    function calculateMasterTotals() {
        const getVal = (id) => {
            const e = el(id);
            if (!e) return 0;
            const text = e.tagName === 'INPUT' ? e.value : e.innerText;
            if (!text || text === '-') return 0;
            return parseFloat(text.replace(/,/g, '')) || 0;
        };

        const subReceipts = getVal('sb-in-si') + getVal('sb-in-sitrading') + getVal('sb-in-delrec') + getVal('sb-in-bobs');
        if (el('sb-out-subtotal-receipts')) el('sb-out-subtotal-receipts').innerText = subReceipts > 0 ? fmt(subReceipts) : '-';

        const totalPaidCash = subReceipts + getVal('sidebar-collections') + getVal('sidebar-credits') + getVal('sidebar-others');
        if (el('sb-out-total-paid-cash')) el('sb-out-total-paid-cash').innerText = totalPaidCash > 0 ? fmt(totalPaidCash) : '-';

        const totalPaidOut = getVal('sidebar-cash-expenses') + getVal('sidebar-deductions') + getVal('sidebar-drawings') + getVal('sidebar-cash-purchases');
        if (el('sb-out-total-paid-out')) el('sb-out-total-paid-out').innerText = totalPaidOut > 0 ? fmt(totalPaidOut) : '-';

        const totalPayments = getVal('sb-in-pay-check') + getVal('sb-in-pay-transfer') + getVal('sb-in-pay-gcash') + getVal('sb-in-pay-ewallet');
        if (el('sb-out-total-payments')) el('sb-out-total-payments').innerText = totalPayments > 0 ? fmt(totalPayments) : '-';

        const openingCash = getVal('sb-in-opening');
        const expectedCash = openingCash + totalPaidCash - totalPaidOut - totalPayments;
        if (el('sb-out-expected-cash')) el('sb-out-expected-cash').innerText = expectedCash !== 0 ? fmt(expectedCash) : '-';

        const cashAmount = getVal('sb-in-pay-cash');
        const cashVariance = cashAmount - totalPaidOut;

        const varianceBox = el('sb-grand-variance-box');
        const varianceSpan = el('sb-out-variance');

        if (varianceBox && varianceSpan) {
            varianceBox.classList.remove('warning', 'overage', 'balanced');

            if (expectedCash === 0 && cashAmount === 0) {
                varianceSpan.innerText = '-';
                return;
            }

            if (cashVariance < 0) {
                varianceBox.classList.add('warning');
                varianceSpan.innerText = fmt(cashVariance);
            } else if (cashVariance > 0) {
                varianceBox.classList.add('overage');
                varianceSpan.innerText = "+" + fmt(cashVariance);
            } else {
                varianceBox.classList.add('balanced');
                varianceSpan.innerText = "Balanced";
            }
        }
    }


    /* ==========================================================================
      GROUP 6: TOOLTIP SYSTEM
      ========================================================================== */
    function initTooltips() {
        // 1. Sidebar Hover Tooltip
        const sbBreakdownTooltip = document.createElement('div');
        sbBreakdownTooltip.id = 'sidebar-breakdown-tooltip';
        document.body.appendChild(sbBreakdownTooltip);

        const sidebarHoverTargets = [
            { id: 'sidebar-cash-expenses', groupName: 'Company Expenses' },
            { id: 'sidebar-cash-purchases', groupName: 'Purchases' },
            { id: 'sidebar-drawings', groupName: 'Drawings' },
            { id: 'sidebar-deductions', groupName: 'Deductions' },
            { id: 'sb-in-pay-cash', groupName: 'Cash Amount' }
        ];

        sidebarHoverTargets.forEach(target => {
            const valueSpan = el(target.id);
            const hoverRow = valueSpan ? valueSpan.closest('.sb-row') : null;

            if (hoverRow) {
                hoverRow.addEventListener('mouseenter', () => {
                    sbBreakdownTooltip.innerHTML = buildBreakdownHTML(target.groupName);
                    sbBreakdownTooltip.classList.add('show');
                });
                hoverRow.addEventListener('mousemove', (e) => {
                    sbBreakdownTooltip.style.left = (e.clientX + 15) + 'px';
                    sbBreakdownTooltip.style.top = (e.clientY + 15) + 'px';
                });
                hoverRow.addEventListener('mouseleave', () => {
                    sbBreakdownTooltip.classList.remove('show');
                });
            }
        });

        // 2. Cell Text Overflow Tooltip
        const textTooltip = document.createElement('div');
        textTooltip.id = 'custom-hover-tooltip';
        document.body.appendChild(textTooltip);

        document.addEventListener('mouseover', (e) => {
            const td = e.target.closest('td');
            if (!td) return;
            const tr = td.closest('.exp-row');
            if (!tr) return;

            const cellIndex = Array.from(tr.children).indexOf(td);
            if (cellIndex === 0 || cellIndex === 2) {
                if (td.scrollWidth > td.clientWidth) {
                    const clone = td.cloneNode(true);
                    const icon = clone.querySelector('.drag-icon');
                    if (icon) icon.remove();
                    textTooltip.textContent = clone.textContent.trim();
                    textTooltip.classList.add('visible');
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (textTooltip.classList.contains('visible')) {
                textTooltip.style.left = (e.clientX + 12) + 'px';
                textTooltip.style.top = (e.clientY + 12) + 'px';
            }
        });

        document.addEventListener('mouseout', (e) => {
            const td = e.target.closest('td');
            if (td) textTooltip.classList.remove('visible');
        });
    }

    function buildBreakdownHTML(groupName) {
        let html = `<div class="sb-tt-title">${groupName} Breakdown</div>`;
        let foundItems = false;

        if (groupName === 'Deductions') {
            document.querySelectorAll('.deduct-input').forEach(input => {
                // Safely grab the value and strip everything except numbers and decimals
                let rawVal = input.value || '';
                let cleanVal = rawVal.replace(/[^0-9.]/g, '');
                let val = parseFloat(cleanVal);

                if (!isNaN(val) && val > 0) {
                    const name = input.getAttribute('data-name');
                    html += `<div class="sb-tt-row"><span class="sb-tt-desc">${name}</span><span class="sb-tt-amt">${fmt(val)}</span></div>`;
                    foundItems = true;
                }
            });

        } else if (groupName === 'Cash Amount') {
            document.querySelectorAll('.denom-qty').forEach(input => {
                // Safely grab the value and strip everything except numbers
                let rawVal = input.value || '';
                let cleanVal = rawVal.replace(/[^0-9]/g, '');
                let qty = parseInt(cleanVal, 10);

                if (!isNaN(qty) && qty > 0) {
                    const faceValue = parseFloat(input.getAttribute('data-val'));
                    const label = faceValue >= 1 ? faceValue.toLocaleString('en-US') : faceValue.toFixed(2);
                    const rowTotal = qty * faceValue;
                    html += `<div class="sb-tt-row"><span class="sb-tt-desc">₱${label} x ${qty}</span><span class="sb-tt-amt">${fmt(rowTotal)}</span></div>`;
                    foundItems = true;
                }
            });

        } else {
            let currentGroup = '';
            document.querySelectorAll('#expenseTable tr').forEach(row => {
                if (row.querySelector('th') || row.querySelector('td[colspan]')) {
                    currentGroup = row.textContent.trim();
                }
                if (currentGroup.includes(groupName) && row.children.length >= 5 && !row.querySelector('th')) {
                    const desc = row.children[0].textContent.trim().replace('⠿', '').trim();
                    const amt = row.children[4].textContent.trim();
                    html += `<div class="sb-tt-row"><span class="sb-tt-desc">${desc}</span><span class="sb-tt-amt">${amt}</span></div>`;
                    foundItems = true;
                }
            });
        }

        if (!foundItems) html += `<div class="sb-tt-empty">No items recorded.</div>`;
        return html;
    }
    // ==========================================
    // HISTORY MANAGER (UNDO / REDO)
    // ==========================================
    const HistoryManager = {
        states: {
            expenses: { past: [], future: [] },
            checks: { past: [], future: [] },
            income: { past: [], future: [] },
            installment: { past: [], future: [] }
        },

        // Takes a snapshot of the current array BEFORE you change it
        saveState: function (key, currentArray) {
            // Deep copy the array to prevent reference bugs
            const snapshot = JSON.stringify(currentArray);
            this.states[key].past.push(snapshot);
            // Once you make a new change, you can't redo old futures
            this.states[key].future = [];
            this.updateButtons(key);
        },

        undo: function (key, currentArray, renderCallback) {
            if (this.states[key].past.length === 0) return currentArray;

            // Save current state to future (so we can redo)
            this.states[key].future.push(JSON.stringify(currentArray));

            // Pop the last state from past
            const previousState = JSON.parse(this.states[key].past.pop());
            this.updateButtons(key);

            // Re-render the table with the old data
            renderCallback(previousState);
            return previousState;
        },

        redo: function (key, currentArray, renderCallback) {
            if (this.states[key].future.length === 0) return currentArray;

            // Save current state to past (so we can undo again)
            this.states[key].past.push(JSON.stringify(currentArray));

            // Pop the next state from future
            const nextState = JSON.parse(this.states[key].future.pop());
            this.updateButtons(key);

            // Re-render the table with the newer data
            renderCallback(nextState);
            return nextState;
        },

        updateButtons: function (key) {
            const undoBtn = document.getElementById(`undo-${key}`);
            const redoBtn = document.getElementById(`redo-${key}`);

            if (undoBtn) undoBtn.disabled = this.states[key].past.length === 0;
            if (redoBtn) redoBtn.disabled = this.states[key].future.length === 0;
        }
    };

    // Global hooks for the HTML buttons
    function undoAction(key) {
        if (key === 'expenses') expensesData = HistoryManager.undo(key, expensesData, (data) => { expensesData = data; fullRender(); calculateMasterTotals(); });
        if (key === 'checks') checksData = HistoryManager.undo(key, checksData, (data) => { checksData = data; renderChecks(); calculateMasterTotals(); });
        if (key === 'income') incomeData = HistoryManager.undo(key, incomeData, (data) => { incomeData = data; renderIncome(); calculateMasterTotals(); });
    }

    function redoAction(key) {
        if (key === 'expenses') expensesData = HistoryManager.redo(key, expensesData, (data) => { expensesData = data; fullRender(); calculateMasterTotals(); });
        if (key === 'checks') checksData = HistoryManager.redo(key, checksData, (data) => { checksData = data; renderChecks(); calculateMasterTotals(); });
        if (key === 'income') incomeData = HistoryManager.redo(key, incomeData, (data) => { incomeData = data; renderIncome(); calculateMasterTotals(); });
    }
    // Function to toggle the left sidebar
    function toggleSidebar() {
        const sidebar = document.querySelector('.left-section');
        const overlay = document.getElementById('mobileOverlay');

        sidebar.classList.toggle('show-sidebar');

        // Show overlay if sidebar is open
        if (sidebar.classList.contains('show-sidebar')) {
            overlay.classList.add('show');
        } else {
            overlay.classList.remove('show');
        }
    }

    // Function to open the right-side form for the currently active tab
    function openMobileForm() {
        const activeTab = document.querySelector('.tab-panel.active');
        if (!activeTab) return;

        const formSide = activeTab.querySelector('.exp-form-side');
        const overlay = document.getElementById('mobileOverlay');

        if (formSide) {
            formSide.classList.add('show-form');
            overlay.classList.add('show');
        }
    }

    // Function to close EVERYTHING (triggered by clicking the dark overlay)
    function closeAllPanels() {
        // Close all forms
        document.querySelectorAll('.exp-form-side.show-form').forEach(el => {
            el.classList.remove('show-form');
        });

        // Close sidebar
        const sidebar = document.querySelector('.left-section');
        if (sidebar) sidebar.classList.remove('show-sidebar');

        // Hide overlay
        document.getElementById('mobileOverlay').classList.remove('show');
    }
</script>
